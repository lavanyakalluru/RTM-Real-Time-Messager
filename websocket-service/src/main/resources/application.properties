spring.application.name=websocket-service
server.port=8086

# Eureka
eureka.client.service-url.defaultZone=${EUREKA_URL}

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_SERVER}

spring.kafka.consumer.group-id=${KAFKA_GROUP}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.value.default.type=com.example.websocketservice.model.MessageEvent